<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AAMVA to PDF417 Generator 2026</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body class="bg-slate-50 text-slate-900 font-sans antialiased min-h-screen">
  <div class="max-w-7xl mx-auto p-4 sm:p-6 lg:p-8">
    <header class="mb-10 text-center">
      <h1 class="text-4xl font-extrabold text-indigo-600 mb-2 flex items-center justify-center gap-3">
        <svg class="w-8 h-8 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"></path></svg>
        AAMVA PDF417 Generator
      </h1>
      <p class="text-slate-500">Modernized to 2026 Standards</p>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
      <!-- Input Form -->
      <section class="lg:col-span-7 bg-white rounded-2xl shadow-sm border border-slate-100 p-6 sm:p-8">
        <h2 class="text-2xl font-bold mb-6 text-slate-800 border-b border-slate-100 pb-4">Data Fields</h2>
        <form id="aamva-form" class="space-y-6">
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-x-6 gap-y-5" id="form-fields">
            <!-- Dynamically generated fields will go here -->
          </div>
        </form>
      </section>

      <!-- Right Column: Raw Data & Barcode -->
      <section class="lg:col-span-5 space-y-6">
        <!-- Barcode Preview -->
        <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6 sm:p-8 flex flex-col items-center justify-center sticky top-6">
          <h2 class="text-xl font-bold mb-6 text-slate-800 border-b border-slate-100 w-full text-center pb-4">PDF417 Barcode Preview</h2>
          <div class="bg-white p-4 rounded-xl shadow-inner border border-slate-100 mb-6 w-full flex justify-center overflow-x-auto min-h-[150px]">
            <canvas id="barcode-canvas" class="max-w-full"></canvas>
          </div>
          <button id="download-btn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-3 px-4 rounded-xl shadow-sm transition duration-200 flex items-center justify-center gap-2">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
            Download Barcode
          </button>
        </div>

        <!-- Raw AAMVA Text -->
        <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6 sm:p-8">
          <h2 class="text-xl font-bold mb-6 text-slate-800 border-b border-slate-100 pb-4 flex items-center justify-between">
            Raw AAMVA String
            <span class="text-xs font-normal text-slate-400 bg-slate-100 px-2 py-1 rounded">Auto-syncs</span>
          </h2>
          <textarea id="raw-aamva" rows="12" class="w-full font-mono text-sm p-4 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 bg-slate-50 text-slate-700 transition duration-200"></textarea>
        </div>
      </section>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
